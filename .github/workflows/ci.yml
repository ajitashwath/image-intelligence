name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "feature/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint-and-test-backend:
    name: "Backend — Build, Test & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend Node dependencies
        working-directory: backend
        run: npm ci

      - name: Compile TypeScript (tsc)
        working-directory: backend
        run: npm run build

      - name: Run Jest unit tests
        working-directory: backend
        run: npm test

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linting tools
        run: pip install flake8 bandit

      - name: flake8 — PEP8 / style lint
        run: |
          flake8 backend/src/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --statistics

      - name: bandit — Python security lint
        run: bandit -r backend/src/ -ll

  lint-and-build-frontend:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint / project lint
        working-directory: frontend
        run: npm run lint

      - name: Vite production build
        working-directory: frontend
        env:
          VITE_API_URL: "http://placeholder"
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  security-scan:
    name: "Security — Trivy Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: false

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://placeholder \
            -t frontend-ci-scan:${{ github.sha }} \
            docker/frontend/

      - name: Trivy — Docker image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: "frontend-ci-scan:${{ github.sha }}"
          format: table
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: false

  validate-terraform:
    name: "Terraform — Validate & Fmt"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform 1.6.0
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

  mock-stress-test:
    name: "Stress Test — Mock (no AWS)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stress test dependencies
        run: pip install -r stress_test/requirements.txt

      - name: Run mock stress test
        run: python stress_test/mock_stress_test.py
        # The mock test uses only in-process mocks — no AWS credentials required.
        # The real stress_test.py runs post-deploy against the live environment
        # using values from CDK outputs (see stress_test/.env.example).
