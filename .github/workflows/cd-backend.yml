name: CD — Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/cd-backend.yml"

concurrency:
  group: cd-backend-production
  cancel-in-progress: false

jobs:

  ci-gate:
    name: "Gate — CI must pass"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Compile TypeScript
        working-directory: backend
        run: npm run build

      - name: Run Jest tests
        working-directory: backend
        run: npm test

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linting tools
        run: pip install flake8 bandit

      - name: flake8 lint
        run: |
          flake8 backend/src/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --statistics

      - name: bandit security scan
        run: bandit -r backend/src/ -ll

  deploy-infrastructure:
    name: "Deploy — Terraform + CDK"
    runs-on: ubuntu-latest
    needs: ci-gate

    environment: production

    permissions:
      id-token: write
      contents: read

    outputs:
      api_gateway_url: ${{ steps.cdk-deploy.outputs.api_gateway_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActionsDeployment-${{ github.run_id }}

      - name: Set up Terraform 1.6.0
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -out=tfplan \
            -detailed-exitcode || EXITCODE=$?
          if [ "${EXITCODE:-0}" -eq 1 ]; then exit 1; fi

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript before CDK deploy
        working-directory: backend
        run: npm run build

      - name: CDK deploy (all stacks)
        id: cdk-deploy
        working-directory: backend
        run: |
          CDK_OUTPUT=$(npx cdk deploy \
            --require-approval never \
            --all \
            --outputs-file /tmp/cdk-outputs.json \
            2>&1)
          echo "$CDK_OUTPUT"

          API_URL=$(jq -r '.. | .ApiGatewayUrl? // empty' /tmp/cdk-outputs.json | head -1)
          echo "api_gateway_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice title=API Gateway URL::${API_URL}"

      - name: Print API Gateway URL
        run: |
          echo "Deployed API Gateway URL: ${{ steps.cdk-deploy.outputs.api_gateway_url }}"
