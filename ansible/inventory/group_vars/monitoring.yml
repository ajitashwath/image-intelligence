---

elastic_version:   "8.13.0"

# Encrypt with: ansible-vault encrypt_string 'yourpassword' --name elastic_password
# Then paste the !vault | block below.
elastic_password: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  REPLACE_WITH_OUTPUT_OF_ansible-vault_encrypt_string

elastic_heap_size: "512m"

elasticsearch_port: 9200

logstash_version:    "8.13.0"

logstash_heap_size: "256m"

logstash_beats_port: 5044

logstash_udp_port:  5000

kibana_version: "8.13.0"
kibana_port:    5601

grafana_version: "latest"
grafana_port:    3000

# Encrypt with: ansible-vault encrypt_string 'yourgrafanapassword' --name grafana_admin_password
grafana_admin_password: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  REPLACE_WITH_OUTPUT_OF_ansible-vault_encrypt_string

grafana_plugins:
  - grafana-cloudwatch-datasource
  - grafana-piechart-panel

jenkins_port: 8080

# Encrypt with: ansible-vault encrypt_string 'yourjenkinspassword' --name jenkins_admin_password
jenkins_admin_password: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  REPLACE_WITH_OUTPUT_OF_ansible-vault_encrypt_string

java_version: "17"

jenkins_plugins:
  - git
  - github
  - workflow-aggregator
  - pipeline-aws
  - slack
  - blueocean
  - docker-workflow
  - credentials-binding
  - aws-credentials
