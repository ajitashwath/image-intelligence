input {
  beats {
    port => 5044
  }

  udp {
    port  => 5000
    codec => json
  }
}

filter {
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "lambda_log"
      tag_on_failure => ["_jsonparsefailure"]
    }
  }

  if [log][file][path] =~ "/aws/lambda/" {
    grok {
      match => {
        "[log][file][path]" => "/aws/lambda/%{DATA:lambda_function_name}"
      }
      tag_on_failure => ["_grok_path_failure"]
    }

    mutate {
      add_tag   => ["lambda", "aws"]
      add_field => {
        "pipeline"   => "image-intelligence"
        "aws_region" => "${AWS_REGION:us-east-1}"
      }
    }
  }

  if [lambda_function_name] =~ /[Oo]rchestrator/ {
    mutate {
      add_tag => ["orchestrator"]
    }

    grok {
      match => {
        "message" => [
          "Processing image %{DATA:image_key} from bucket %{DATA:bucket_name}",
          "Dispatching analysis for image_id=%{DATA:image_id}"
        ]
      }
      tag_on_failure => []
    }
  }

  if [lambda_function_name] =~ /[Aa]nalysis/ {
    mutate {
      add_tag => ["analysis"]
    }

    grok {
      match => {
        "message" => "Label: %{DATA:rekognition_label}, Confidence: %{NUMBER:label_confidence:float}"
      }
      tag_on_failure => []
    }
  }

  if [message] =~ /BLOCKED/ or [lambda_log][moderation_action] == "BLOCK" {
    mutate {
      add_tag   => ["moderation_blocked"]
      add_field => {
        "alert_level"    => "high"
        "alert_category" => "content_moderation"
      }
    }
  }

  if [message] =~ /FLAGGED/ or [lambda_log][moderation_action] == "FLAG" {
    mutate {
      add_tag   => ["moderation_flagged"]
      add_field => {
        "alert_level"    => "medium"
        "alert_category" => "content_moderation"
      }
    }
  }

  if [lambda_function_name] =~ /[Nn]otifier/ {
    mutate {
      add_tag => ["notifier"]
    }

    grok {
      match => {
        "message" => "Notification sent via %{DATA:notification_channel} for %{DATA:notification_target}"
      }
      tag_on_failure => []
    }
  }

  date {
    match  => ["timestamp", "ISO8601", "UNIX_MS", "UNIX"]
    target => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }

  mutate {
    remove_field => [
      "host",
      "agent",
      "ecs"
    ]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST}"]
    user     => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"

    index    => "image-intelligence-%{+YYYY.MM.dd}"

    ilm_enabled        => true
    ilm_rollover_alias => "image-intelligence"
    ilm_pattern        => "{now/d}-000001"
    ilm_policy         => "image-intelligence-policy"

    retry_on_conflict => 5
  }

}
