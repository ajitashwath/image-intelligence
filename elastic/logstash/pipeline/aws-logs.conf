input {

  beats {
    port => 5044
  }

  udp {
    port  => 5000
    codec => json
  }

}

filter {

  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      tag_on_failure => ["_jsonparsefailure"]
    }
  }

  if [log][file][path] {
    grok {
      match => { "[log][file][path]" => "/aws/lambda/%{DATA:lambda_function}" }
      tag_on_failure => ["_grokparsefailure_lambda"]
    }
  }

  if [lambda_function] =~ /Orchestrator/ {
    mutate { add_tag => ["orchestrator"] }

    grok {
      match => {
        "message" => "Processing image %{DATA:image_key} from bucket %{DATA:s3_bucket}"
      }
      tag_on_failure => []
    }

    grok {
      match => {
        "message" => "Successfully stored metadata for %{DATA:image_id}\. Moderation: %{WORD:moderation_status}"
      }
      tag_on_failure => []
    }
  }

  if [lambda_function] =~ /Notifier/ {
    mutate { add_tag => ["notifier"] }
  }

  if [lambda_function] =~ /Dashboard/ {
    mutate { add_tag => ["dashboard_api"] }
  }

  if [moderation_status] == "BLOCKED" or [message] =~ /BLOCKED/ {
    mutate {
      add_tag   => ["moderation_alert"]
      add_field => { "alert_severity" => "high" }
    }
  }

  if [message] =~ /ERROR|Exception|Traceback/ {
    mutate { add_tag => ["error"] }
  }

  mutate {
    add_field => {
      "project"                     => "image-intelligence"
      "[@metadata][index_prefix]"   => "image-intelligence"
    }
  }

  date {
    match        => ["[parsed][timestamp]", "ISO8601", "UNIX", "UNIX_MS"]
    target       => "@timestamp"
    tag_on_failure => []
  }

}

output {

  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST:http://elasticsearch:9200}"]
    user     => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"

    index  => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    action => "index"

    retry_on_conflict => 3

  }

}
