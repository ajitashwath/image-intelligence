filebeat.inputs:

  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log

    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          expand_keys: true

  - type: log
    enabled: true
    paths:
      - /var/log/aws/lambda/*.log
    fields:
      source: aws_lambda
    fields_under_root: true
    multiline:
      type: pattern
      pattern: '^\d{4}-\d{2}-\d{2}'
      negate: true
      match: after

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

setup.template.name: "image-intelligence"
setup.template.pattern: "image-intelligence-*"

setup.kibana:
  host: "kibana:5601"
  username: "elastic"
  password: "${ELASTIC_PASSWORD:changeme}"

output.logstash:
  hosts: ["logstash:5044"]
  loadbalance: true
  ttl: 30s

logging.level: warning
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

monitoring:
  enabled: false
